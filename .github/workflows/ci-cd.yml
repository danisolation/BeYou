name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (Lint, Format & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code formatting (Ruff)
        run: python -m ruff format --check .

      - name: Lint codebase (Ruff)
        run: python -m ruff check .

      - name: Run unit & integration tests (Pytest)
        run: python -m pytest

  frontend-ci:
    name: Frontend CI (Lint, Type-check, Test & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax linting (ESLint)
        run: npm run lint

      - name: Verify TypeScript types (tsc)
        run: npx tsc --noEmit

      - name: Run unit & component tests (Vitest)
        run: npm run test

      - name: Run deployment guardrails and release gates tests
        run: |
          npm run test:deploy-guardrails
          npm run test:smoke-profiles
          npm run test:release-gates

      - name: Build Next.js application
        run: npm run build

  post-deploy-smoke:
    name: Post-Deploy Smoke Verification
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for services to deploy & warm up
        run: |
          echo "==== PINGING SERVICES FOR DEPLOYMENT ACCESSIBILITY ===="
          DEPLOY_PROFILE="${{ vars.BEYOU_DEPLOY_PROFILE || 'public_demo' }}"
          FRONTEND_URL="${{ vars.BEYOU_EXPECTED_FRONTEND_URL || 'https://beyou-frontend.vercel.app' }}"
          BACKEND_URL="${{ vars.BEYOU_EXPECTED_BACKEND_URL || 'https://beyou-backend.onrender.com' }}"
          
          echo "Deploy profile: $DEPLOY_PROFILE"
          echo "Frontend URL: $FRONTEND_URL"
          echo "Backend URL: $BACKEND_URL"
          
          # Max duration: 8 minutes (32 tries * 15 seconds) to accommodate Render cold starts
          MAX_ATTEMPTS=32
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS: Checking backend and frontend status..."
            
            FE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$FRONTEND_URL" || echo "failed")
            BE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BACKEND_URL/health/live" || echo "failed")
            
            echo "Frontend HTTP status: $FE_STATUS"
            echo "Backend live HTTP status: $BE_STATUS"
            
            if [ "$FE_STATUS" = "200" ] && [ "$BE_STATUS" = "200" ]; then
              echo "Both frontend and backend are successfully deployed and responding!"
              break
            fi
            
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              if [ "$DEPLOY_PROFILE" = "production_pilot" ]; then
                echo "Timeout waiting for production pilot services to deploy. Smoke test aborted."
                exit 1
              fi

              echo "Timeout waiting for public demo services to deploy. Marking live smoke as constrained."
              echo "BEYOU_SKIP_LIVE_SMOKE=true" >> "$GITHUB_ENV"
              exit 0
            fi
            
            echo "Waiting 15 seconds before next check..."
            sleep 15
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Run Smoke Verification Tests
        env:
          BEYOU_DEPLOY_PROFILE: ${{ vars.BEYOU_DEPLOY_PROFILE || 'public_demo' }}
          BEYOU_FRONTEND_URL: ${{ vars.BEYOU_EXPECTED_FRONTEND_URL || 'https://beyou-frontend.vercel.app' }}
          BEYOU_BACKEND_URL: ${{ vars.BEYOU_EXPECTED_BACKEND_URL || 'https://beyou-backend.onrender.com' }}
          BEYOU_EXPECTED_FRONTEND_URL: ${{ vars.BEYOU_EXPECTED_FRONTEND_URL || 'https://beyou-frontend.vercel.app' }}
          BEYOU_EXPECTED_BACKEND_URL: ${{ vars.BEYOU_EXPECTED_BACKEND_URL || 'https://beyou-backend.onrender.com' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://beyou-backend.onrender.com' }}
          BEYOU_VERCEL_ROOT: ${{ vars.BEYOU_VERCEL_ROOT || 'frontend' }}
          BEYOU_DEMO_PASSWORD: ${{ secrets.BEYOU_DEMO_PASSWORD || 'BeYouDemo!2026' }}
        run: |
          echo "==== RUNNING DEPLOYMENT CONFIG GUARDRAILS ===="
          npm run guard:deploy

          if [ "$BEYOU_SKIP_LIVE_SMOKE" = "true" ]; then
            echo "==== LIVE SMOKE CONSTRAINED ===="
            echo "Public demo services were not reachable during the warm-up window; guardrails passed, live smoke skipped."
            exit 0
          fi
          
          echo "==== RUNNING SMOKE VERIFICATION ===="
          if [ "$BEYOU_DEPLOY_PROFILE" = "production_pilot" ]; then
            echo "Profile is production_pilot. Running pilot smoke verification..."
            npm run smoke:pilot
          else
            echo "Profile is public_demo. Running public demo smoke verification..."
            npm run smoke:demo
          fi
