databases:
  - name: beyou-db
    plan: free
    databaseName: beyou
    user: beyou

services:
  - type: web
    name: beyou-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && python -m app.seeds.demo_seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/live
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: beyou-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: RUNTIME_MODE
        value: public_demo
      - key: SESSION_COOKIE_NAME
        value: __Secure-beyou_session
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: SESSION_MAX_AGE_SECONDS
        value: 86400
      - key: FRONTEND_ORIGIN
        value: https://beyou.vercel.app
      - key: FRONTEND_ORIGINS
        value: https://beyou-frontend.vercel.app
      - key: ALLOW_DEMO_SEED
        value: true
      - key: ALLOW_DEMO_LOGIN
        value: true
      - key: CHAT_PROVIDER
        value: gemini
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: GEMINI_MODELS
        value: gemini-3.1-flash-lite,gemini-3-flash-preview,gemini-2.5-flash,gemini-2.5-flash-lite
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: SOS_EMAIL_PROVIDER
        value: disabled
