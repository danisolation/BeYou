version: 1
requirements: [SAFE-04]
policy: beyou_audit_event_catalog

audit_policy: metadata_only

required_fields:
  - actor_id
  - actor_role
  - action
  - resource_type
  - resource_id
  - timestamp
  - reason
  - status
  - metadata_summary
  - is_demo

forbidden_fields:
  - password
  - token
  - session_cookie
  - api_key
  - raw_chat_content
  - chat_transcript_raw
  - self_check_raw_answers
  - full_self_check_answers

events:
  sensitive_resource_read:
    action: sensitive_resource_read
    resource_types:
      - self_check_summary
      - chat_safety_signal
      - sos_alert
      - student_adult_link
      - audit_event
    reason_required: true
    status_required: true
    metadata_summary: resource class, relationship check, purpose key, decision

  sos_alert_created:
    action: sos_alert_created
    resource_types: [sos_alert]
    reason_required: true
    status_required: true
    metadata_summary: source, severity, recipient count, is_demo

  sos_status_changed:
    action: sos_status_changed
    resource_types: [sos_alert]
    reason_required: true
    status_required: true
    metadata_summary: previous status, new status, actor role, is_demo

  role_changed:
    action: role_changed
    resource_types: [account_profile]
    reason_required: true
    status_required: true
    metadata_summary: target user id, previous role, new role, admin actor

  student_adult_link_created:
    action: student_adult_link_created
    resource_types: [student_adult_link]
    reason_required: true
    status_required: true
    metadata_summary: student id, adult id, relationship type, is_demo

  student_adult_link_revoked:
    action: student_adult_link_revoked
    resource_types: [student_adult_link]
    reason_required: true
    status_required: true
    metadata_summary: student id, adult id, relationship type, is_demo

  admin_safety_content_changed:
    action: admin_safety_content_changed
    resource_types:
      - safety_copy
      - self_check_content
      - scenario_content
      - chatbot_safety_config
    reason_required: true
    status_required: true
    metadata_summary: content type, content id, change type, admin actor

  high_risk_safety_event:
    action: high_risk_safety_event
    resource_types:
      - chat_safety_signal
      - sos_alert
    reason_required: true
    status_required: true
    metadata_summary: source, safety summary, escalation suggestion, is_demo

  privacy_acknowledged:
    action: privacy_acknowledged
    resource_types: [privacy_notice]
    reason_required: false
    status_required: true
    metadata_summary: notice version, acknowledged at, user id, is_demo

  demo_record_accessed:
    action: demo_record_accessed
    resource_types: [demo_record]
    reason_required: true
    status_required: true
    metadata_summary: demo record id, actor role, purpose key

implementation_notes:
  - Audit logs capture actor, action, resource type/id, timestamp, reason/status, and metadata.
  - Audit logs must avoid raw sensitive content.
  - Raw chatbot transcript text, full self-check answers, passwords, tokens, session cookies, and API keys are never audit payload fields.
