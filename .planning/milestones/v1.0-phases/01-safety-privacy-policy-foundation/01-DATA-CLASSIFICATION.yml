version: 1
requirements: [SAFE-01]
policy: beyou_data_classification

classes:
  public_content:
    description: Published safety education, scenario prompts, non-sensitive static copy.
    default_visibility: app_users
    adult_default: visible_when_relevant
    audit_required: false
    raw_content_allowed_by_default: true
    retention: TBD_before_real_pilot

  account_profile:
    description: User identity, role, account status, school/class profile fields.
    default_visibility: owner_and_authorized_admin
    adult_default: limited_profile_context_for_linked_support
    audit_required: true
    raw_content_allowed_by_default: false
    retention: TBD_before_real_pilot

  relationship_links:
    description: Student-teacher-parent relationship records and link status.
    default_visibility: linked_parties_and_authorized_admin
    adult_default: linked_relationship_context_only
    audit_required: true
    raw_content_allowed_by_default: false
    retention: TBD_before_real_pilot

  wellbeing_records:
    description: Self-check answers, scores, support states, summaries, and history.
    default_visibility: student_private_by_default
    adult_default: summary_only
    audit_required: true
    raw_content_allowed_by_default: false
    retention: TBD_before_real_pilot

  safety_sos_chat_signals:
    description: SOS alerts, SOS notes, chatbot safety signals, and raw chat transcript references.
    default_visibility: student_and_safety_purpose_actors
    adult_default: safety_summary_and_confirmed_sos_note_only
    audit_required: true
    raw_content_allowed_by_default: false
    retention: TBD_before_real_pilot

resources:
  student_self_check_raw_answers:
    class: wellbeing_records
    default_visibility: student_only
    adult_default: not_shown_by_default
    audit_required: true
    raw_content_allowed_by_default: false

  self_check_summary:
    class: wellbeing_records
    default_visibility: student_and_linked_adults_for_support_purpose
    adult_default: summary_only
    audit_required: true
    raw_content_allowed_by_default: false

  chat_transcript_raw:
    class: safety_sos_chat_signals
    default_visibility: student_only_by_default
    adult_default: not_shown_by_default
    audit_required: true
    raw_content_allowed_by_default: false

  chat_safety_signal:
    class: safety_sos_chat_signals
    default_visibility: student_and_safety_purpose_actors
    adult_default: safety_summary_only_when_needed
    audit_required: true
    raw_content_allowed_by_default: false

  sos_alert:
    class: safety_sos_chat_signals
    default_visibility: student_and_linked_support_adults
    adult_default: alert_metadata_and_student_confirmed_note
    audit_required: true
    raw_content_allowed_by_default: false

  student_adult_link:
    class: relationship_links
    default_visibility: linked_parties_and_authorized_admin
    adult_default: relationship_context_only
    audit_required: true
    raw_content_allowed_by_default: false

  audit_event:
    class: relationship_links
    default_visibility: authorized_admin_support_audit_purpose
    adult_default: metadata_only
    audit_required: true
    raw_content_allowed_by_default: false

  demo_record:
    class: public_content
    default_visibility: demo_context_only
    adult_default: demo_visible_with_banner_and_badge
    audit_required: true
    raw_content_allowed_by_default: false

locked_defaults:
  raw_chatbot_transcripts: private_to_student_by_default
  adults_see_raw_transcripts_by_default: false
  adult_self_check_access: summary_only_by_default
  high_risk_sharing: safety_summary_and_student_confirmed_sos_note_not_full_transcript
