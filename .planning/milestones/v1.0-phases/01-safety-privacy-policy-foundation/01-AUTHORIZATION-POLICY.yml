version: 1
requirements: [SAFE-03]
policy: beyou_authorization_policy

deny_by_default: true
enforcement_target: backend_phase_2
frontend_only_privacy_enforcement: forbidden

global_checks:
  - authenticated_user_required
  - role_required
  - relationship_required_when_resource_is_student_scoped
  - purpose_required_for_sensitive_resources
  - audit_required_for_sensitive_reads

purpose_keys:
  support_not_surveillance:
    description: Adult access must help the student, not monitor, rank, discipline, or expose them.
  safety_escalation:
    description: Access is limited to confirmed or high-risk safety support.
  admin_operations:
    description: Admin access is limited to account, link, content, or audit operations.
  demo_walkthrough:
    description: Demo access is limited to records marked with is_demo metadata.

resources:
  self_check_raw_answers:
    class: wellbeing_records
    default: deny
    student:
      allowed: own_record
      purpose_required: student_reflection
    teacher:
      allowed: false
      relationship_required: linked_teacher
      purpose_required: support_not_surveillance
      reason: raw_answers_not_shown_by_default
    parent:
      allowed: false
      relationship_required: linked_parent
      purpose_required: support_not_surveillance
      reason: raw_answers_not_shown_by_default
    admin:
      allowed: false
      purpose_required: admin_operations
      reason: raw_answers_not_shown_by_default

  self_check_summary:
    class: wellbeing_records
    default: deny
    student:
      allowed: own_record
    teacher:
      allowed: linked_student_summary_only
      relationship_required: linked_teacher
      purpose_required: support_not_surveillance
    parent:
      allowed: linked_child_summary_only
      relationship_required: linked_parent
      purpose_required: support_not_surveillance
    admin:
      allowed: restricted_summary_only
      purpose_required: admin_operations

  chat_transcript_raw:
    class: safety_sos_chat_signals
    default: deny
    student:
      allowed: own_record
    teacher:
      allowed: false
      relationship_required: linked_teacher
      purpose_required: safety_escalation
      reason: raw_transcripts_private_to_student_by_default
    parent:
      allowed: false
      relationship_required: linked_parent
      purpose_required: safety_escalation
      reason: raw_transcripts_private_to_student_by_default
    admin:
      allowed: false
      purpose_required: admin_operations
      reason: raw_transcripts_private_to_student_by_default

  chat_safety_signal:
    class: safety_sos_chat_signals
    default: deny
    student:
      allowed: own_safety_summary
    teacher:
      allowed: safety_summary_only
      relationship_required: linked_teacher
      purpose_required: safety_escalation
    parent:
      allowed: safety_summary_only
      relationship_required: linked_parent
      purpose_required: safety_escalation
    admin:
      allowed: metadata_only
      purpose_required: admin_operations

  sos_alert:
    class: safety_sos_chat_signals
    default: deny
    student:
      allowed: own_alert_and_status
    teacher:
      allowed: linked_student_alert
      relationship_required: linked_teacher
      purpose_required: safety_escalation
    parent:
      allowed: linked_child_alert
      relationship_required: linked_parent
      purpose_required: safety_escalation
    admin:
      allowed: operational_metadata_only
      purpose_required: admin_operations

  student_adult_link:
    class: relationship_links
    default: deny
    student:
      allowed: own_linked_adults
    teacher:
      allowed: linked_student_relationship_context
      relationship_required: linked_teacher
      purpose_required: support_not_surveillance
    parent:
      allowed: linked_child_relationship_context
      relationship_required: linked_parent
      purpose_required: support_not_surveillance
    admin:
      allowed: manage_links
      purpose_required: admin_operations

  audit_event:
    class: relationship_links
    default: deny
    student:
      allowed: false
    teacher:
      allowed: false
    parent:
      allowed: false
    admin:
      allowed: metadata_only
      purpose_required: admin_operations

  demo_record:
    class: public_content
    default: deny
    student:
      allowed: demo_context_only
      purpose_required: demo_walkthrough
    teacher:
      allowed: demo_context_only
      purpose_required: demo_walkthrough
    parent:
      allowed: demo_context_only
      purpose_required: demo_walkthrough
    admin:
      allowed: demo_context_or_admin_operations
      purpose_required: demo_walkthrough

locked_decisions:
  adults_get_self_check_summary_only_by_default: true
  raw_answers_shown_to_adults_by_default: false
  raw_chat_transcripts_shown_to_adults_by_default: false
  high_risk_sharing_uses_full_transcript: false
  high_risk_sharing_uses: safety_summary_and_student_confirmed_sos_note
