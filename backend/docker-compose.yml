services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: beyou
      POSTGRES_USER: beyou
      POSTGRES_PASSWORD: beyou_dev_password
    ports:
      - "15432:5432"
    volumes:
      - beyou_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyou -d beyou"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  beyou_postgres_data:
